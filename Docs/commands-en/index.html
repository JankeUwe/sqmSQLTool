*{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--tx);line-height:1.6}
header{background:linear-gradient(135deg,var(--n),var(--b));padding:28px 0;border-bottom:2px solid var(--c);box-shadow:0 2px 8px rgba(0,0,0,.3)}
.hc{max-width:1100px;margin:0 auto;padding:0 24px}
.logo{font-size:1.6rem;font-weight:900;color:#fff;text-decoration:none;display:block;margin-bottom:4px}
.tag{color:#c5e8f5;font-size:.92rem}
main{max-width:1100px;margin:0 auto;padding:36px 24px}
.stats{display:flex;gap:20px;margin-bottom:28px;flex-wrap:wrap}
.stat{background:var(--sf);border:1px solid var(--br);border-radius:8px;padding:14px 22px;text-align:center;min-width:110px}
.sn{font-size:1.9rem;font-weight:900;color:var(--c);font-family:"Cascadia Code",monospace}
.sl{font-size:.75rem;color:var(--mu);text-transform:uppercase;letter-spacing:.5px}
.sb{position:relative;margin-bottom:20px}
.sb input{width:100%;padding:13px 18px 13px 44px;background:var(--sf);border:1px solid var(--br);border-radius:8px;color:var(--tx);font-size:.95rem;font-family:inherit;outline:none;transition:border .2s}
.sb input::placeholder{color:var(--mu)}
.sb input:focus{border-color:var(--c)}
.si{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--mu);font-size:1rem}
.cats{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:22px}
.cb{padding:6px 15px;border-radius:20px;border:1px solid var(--br);background:var(--sf);color:var(--mu);cursor:pointer;font-size:.82rem;font-family:inherit;transition:all .2s;white-space:nowrap}
.cb:hover{border-color:var(--c);color:var(--c)}
.cb.active{border-color:var(--c);background:rgba(0,200,232,.12);color:var(--c);font-weight:700}
#ri{color:var(--mu);font-size:.88rem;margin-bottom:14px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:14px}
.card{background:var(--sf);border:1px solid var(--br);border-radius:8px;padding:16px;text-decoration:none;transition:all .22s;display:block}
.card:hover{border-color:var(--c);background:rgba(0,200,232,.05);transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,200,232,.12)}
.cn{font-family:"Cascadia Code","Consolas",monospace;font-size:.9rem;font-weight:700;color:var(--c);margin-bottom:7px;word-break:break-all}
.cd{font-size:.8rem;color:var(--mu);line-height:1.4;margin-bottom:9px}
.cc{display:inline-block;padding:2px 9px;border-radius:10px;font-size:.68rem;font-weight:700;text-transform:uppercase;color:#fff}
footer{background:var(--sf);border-top:1px solid var(--br);padding:36px 24px;margin-top:50px;text-align:center;color:var(--mu);font-size:.88rem}
footer a{color:var(--c);text-decoration:none}
@media(max-width:640px){.grid{grid-template-columns:1fr}.stats{justify-content:center}}
</style>
</head>
