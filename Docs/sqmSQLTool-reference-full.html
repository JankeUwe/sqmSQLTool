<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sqmSQLTool - Command Reference</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: #060f20;
            color: #e2e8f0;
            line-height: 1.6;
        }

        .psdb-st {
            display: flex;
            min-height: 100vh;
        }

        .psdb-st-sidebar {
            width: 280px;
            background-color: #0b1e3d;
            padding: 2rem 0;
            border-right: 1px solid #1e3a5f;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            top: 0;
            left: 0;
        }

        .psdb-st-sidebar-title {
            padding: 0 1.5rem;
            margin-bottom: 1.5rem;
            font-size: 0.875rem;
            font-weight: 600;
            color: #94a8c0;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .psdb-st-sidebar-search {
            padding: 0 1rem 1rem;
            margin-bottom: 1.5rem;
        }

        .psdb-st-sidebar-search input {
            width: 100%;
            padding: 0.5rem 0.75rem;
            background-color: #051329;
            border: 1px solid #1e3a5f;
            border-radius: 0.375rem;
            color: #e2e8f0;
            font-size: 0.875rem;
        }

        .psdb-st-sidebar-search input:focus {
            outline: none;
            border-color: #2e86c1;
            background-color: #051329;
        }

        .psdb-st-sidebar-list {
            list-style: none;
            padding: 0 0.5rem;
        }

        .psdb-st-sidebar-item {
            margin-bottom: 0.25rem;
        }

        .psdb-st-sidebar-link {
            display: block;
            padding: 0.5rem 1rem;
            color: #94a8c0;
            text-decoration: none;
            border-radius: 0.375rem;
            font-size: 0.875rem;
            transition: all 0.2s ease;
        }

        .psdb-st-sidebar-link:hover {
            background-color: #1e3a5f;
            color: #e2e8f0;
        }

        .psdb-st-sidebar-link.active {
            background-color: #2e86c1;
            color: #ffffff;
            font-weight: 600;
        }

        .psdb-st-content {
            flex: 1;
            margin-left: 280px;
            padding: 2rem 3rem;
            max-width: 1400px;
            margin-right: auto;
        }

        .psdb-st-header {
            margin-bottom: 3rem;
        }

        .psdb-st-h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(160deg, #2e86c1 0%, #5dade2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .psdb-st-subtitle {
            color: #94a8c0;
            font-size: 1rem;
        }

        .psdb-st-functions {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
        }

        .psdb-st-card {
            background-color: #0b1e3d;
            border: 1px solid #1e3a5f;
            border-radius: 0.5rem;
            padding: 2rem;
            transition: all 0.2s ease;
        }

        .psdb-st-card:hover {
            border-color: #2e86c1;
            box-shadow: 0 0 20px rgba(46, 134, 193, 0.1);
        }

        .psdb-st-card-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: #5dade2;
            margin-bottom: 0.75rem;
            font-family: 'Courier New', monospace;
        }

        .psdb-st-card-synopsis {
            color: #e2e8f0;
            margin-bottom: 1rem;
            line-height: 1.6;
        }

        .psdb-st-section-title {
            font-size: 0.875rem;
            font-weight: 700;
            color: #94a8c0;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-top: 1rem;
            margin-bottom: 0.5rem;
        }

        .psdb-st-params {
            list-style: none;
            margin-bottom: 1rem;
        }

        .psdb-st-param {
            padding: 0.5rem 0;
            color: #94a8c0;
            font-family: 'Courier New', monospace;
            font-size: 0.875rem;
            margin-left: 0;
        }

        .psdb-st-param::before {
            content: '→ ';
            color: #2e86c1;
            margin-right: 0.5rem;
        }

        .psdb-st-examples {
            margin-top: 1rem;
        }

        .psdb-st-example {
            background-color: #051329;
            border-left: 3px solid #2e86c1;
            padding: 1rem;
            margin-bottom: 0.75rem;
            border-radius: 0.25rem;
            font-family: 'Courier New', monospace;
            font-size: 0.875rem;
            color: #94a8c0;
            white-space: pre-wrap;
            word-wrap: break-word;
            line-height: 1.4;
        }

        .psdb-st-no-data {
            color: #94a8c0;
            font-style: italic;
        }

        @media (max-width: 1024px) {
            .psdb-st-sidebar {
                width: 250px;
            }
            .psdb-st-content {
                margin-left: 250px;
                padding: 1.5rem 2rem;
            }
        }

        @media (max-width: 768px) {
            .psdb-st {
                flex-direction: column;
            }
            .psdb-st-sidebar {
                position: relative;
                width: 100%;
                height: auto;
                border-right: none;
                border-bottom: 1px solid #1e3a5f;
            }
            .psdb-st-content {
                margin-left: 0;
                padding: 1rem;
            }
            .psdb-st-h1 {
                font-size: 1.75rem;
            }
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="psdb-st">
        <aside class="psdb-st-sidebar">
            <div class="psdb-st-sidebar-title">Functions</div>
            <div class="psdb-st-sidebar-search">
                <input type="text" id="search" placeholder="Search...">
            </div>
            <ul class="psdb-st-sidebar-list" id="function-list"></ul>
        </aside>

        <main class="psdb-st-content">
            <div class="psdb-st-header">
                <h1 class="psdb-st-h1">sqmSQLTool</h1>
                <p class="psdb-st-subtitle">Command Reference - 124 Functions</p>
            </div>

            <div class="psdb-st-functions" id="functions-container"></div>
        </main>
    </div>

    <script>
        const functions = [
  {
    "Name": "_sqmSplunkWriteLog",
    "Synopsis": "Configures the Splunk Universal Forwarder on SQL Server hosts.",
    "Params": [
      "Remote",
      "SearchOU",
      "Credential"
    ],
    "Examples": [
      "Invoke-sqmSplunkConfiguration",
      "Invoke-sqmSplunkConfiguration -Mode Test",
      "Invoke-sqmSplunkConfiguration -Remote -SearchOU \"OU=DB-Server,DC=contoso,DC=com\"",
      "Invoke-sqmSplunkConfiguration -ComputerList \"SRV-SQL01\",\"SRV-SQL02\"",
      "Invoke-sqmSplunkConfiguration -ComputerList \"C:\\Listen\\db-server.txt\" -Mode Test"
    ]
  },
  {
    "Name": "Add-sqmDatabaseToAG",
    "Synopsis": "Adds one or more databases to an Always On availability group (AutoSeed).",
    "Params": [
      "SqlInstance",
      "SqlCredential",
      "AvailabilityGroup",
      "All",
      "EnableException"
    ],
    "Examples": [
      "Add-sqmDatabaseToAG -AvailabilityGroup \"AG1\" -Database \"SalesDB\"",
      "Add-sqmDatabaseToAG -AvailabilityGroup \"AG1\" -All"
    ]
  },
  {
    "Name": "Add-sqmDatabaseToDistributedAg",
    "Synopsis": "Adds a database to a Distributed AlwaysOn Availability Group.",
    "Params": [
      "SqlInstance",
      "AvailabilityGroupName",
      "DatabaseName",
      "SecondaryInstance",
      "BackupPath",
      "SqlCredential",
      "EnableException"
    ],
    "Examples": [
      "Add-sqmDatabaseToDistributedAg -SqlInstance \"SQL01\" -AvailabilityGroupName \"MyDAG\" -DatabaseName \"MyDb\" -SecondaryInstance \"DR-SQL01\""
    ]
  },
  {
    "Name": "Compare-sqmServerConfiguration",
    "Synopsis": "Compares important configuration settings between two SQL Server instances.",
    "Params": [
      "SourceInstance",
      "TargetInstance",
      "SqlCredential",
      "CompareDatabases",
      "EnableException"
    ],
    "Examples": [
      "Compare-sqmServerConfiguration -SourceInstance \"SQL01\" -TargetInstance \"SQL02\""
    ]
  },
  {
    "Name": "Complete-sqmListenerMigration",
    "Synopsis": "Completes listener migration after cluster team recreates the listener resource.",
    "Params": [
      "SqlInstance",
      "AvailabilityGroupName",
      "ListenerName",
      "SqlCredential",
      "OutputPath",
      "EnableException"
    ],
    "Examples": [
      "# STEP 1: DBA runs Invoke-sqmListenerMigrationPrep\n    # STEP 2: AD team deletes/recreates listener role (15-30 min wait)\n    # STEP 3: DBA runs this function\n\n    Complete-sqmListenerMigration -SqlInstance \"SQL02\" -AvailabilityGroupName \"ProdAG\" -ListenerName \"PROD-SQL-Listener\""
    ]
  },
  {
    "Name": "Copy-sqmLogins",
    "Synopsis": "Copies logins from a source SQL Server instance to a target instance.",
    "Params": [
      "Source",
      "Destination",
      "SqlCredential",
      "SourceCredential",
      "DestinationCredential",
      "IncludeSystemLogins",
      "DisablePolicy",
      "AdjustAuthMode",
      "RestartServiceIfRequired",
      "Force",
      "AdModuleAction",
      "ContinueOnError",
      "EnableException"
    ],
    "Examples": [
      "Copy-sqmLogins -Source 'SQL01' -Destination 'SQL02'\r\n\r\n    Copies all non-system logins. Policy is disabled/re-enabled,\r\n    AD check and orphan repair run automatically.",
      "Copy-sqmLogins -Source 'SQL01' -Destination 'SQL02' -AdjustAuthMode -RestartServiceIfRequired\r\n\r\n    Copies all logins and switches the target server to Mixed Mode if needed.\r\n    Automatically restarts the SQL service if required.",
      "Copy-sqmLogins -Source 'SQL01' -Destination 'SQL02' -Login 'App_*' -Force\r\n\r\n    Copies only logins starting with 'App_' and overwrites existing ones.",
      "Copy-sqmLogins -Source 'SQL01' -Destination 'SQL02' -DisablePolicy $false -WhatIf\r\n\r\n    Simulates the operation without policy handling."
    ]
  },
  {
    "Name": "Copy-sqmNTFSPermissions",
    "Synopsis": "Copies NTFS permissions (ACLs) from a source path to a destination path.",
    "Params": [
      "SourcePath",
      "DestinationPath"
    ],
    "Examples": [
      "Copy-sqmNTFSPermissions -SourcePath \"D:\\\" -DestinationPath \"E:\\\" -Recurse\n    Copies all permissions from D: to E: (recursively).",
      "Copy-sqmNTFSPermissions -SourcePath \"D:\\Daten\" -DestinationPath \"E:\\Daten\" -Recurse -CreateMissingFolders\n    Copies permissions and creates missing target folders."
    ]
  },
  {
    "Name": "Copy-sqmToCentralPath",
    "Synopsis": "Copies one or more files to the configured CentralPath.",
    "Params": [],
    "Examples": []
  },
  {
    "Name": "Export-sqmAlwaysOnConfiguration",
    "Synopsis": "Exports the complete AlwaysOn AG configuration for one or more SQL Server instances.",
    "Params": [
      "SqlCredential",
      "OutputPath",
      "NoWarning",
      "NoOpen",
      "EnableException"
    ],
    "Examples": [
      "Export-sqmAlwaysOnConfiguration -SqlInstance \"SQL01\"\n\t# Exports all AGs from SQL01, warns if ReadableSecondary != NO",
      "Export-sqmAlwaysOnConfiguration -SqlInstance \"SQL01\" -NoWarning\n\t# Exports all AGs, suppresses Write-Warning but Status still shows if issues",
      "Export-sqmAlwaysOnConfiguration -SqlInstance \"SQL01\" -OutputPath \"D:\\Reports\" -NoOpen\n\t# Exports to D:\\Reports, does not auto-open TXT file"
    ]
  },
  {
    "Name": "Export-sqmDatabaseDocumentation",
    "Synopsis": "Creates structured HTML and CSV documentation for all databases on a SQL Server instance.",
    "Params": [
      "SqlCredential",
      "IncludeSystemDatabases",
      "IncludeFileDetails",
      "IncludeUsers",
      "IncludeObjectSummary",
      "OutputPath",
      "ContinueOnError",
      "EnableException"
    ],
    "Examples": [
      "Export-sqmDatabaseDocumentation",
      "Export-sqmDatabaseDocumentation -SqlInstance \"SQL01\" -Database \"SalesDB\",\"HRApp\" -OutputPath \"D:\\Reports\"",
      "Export-sqmDatabaseDocumentation -SqlInstance \"SQL01\" -IncludeSystemDatabases -ContinueOnError",
      "# Multiple instances via pipeline\r\n    \"SQL01\",\"SQL02\",\"SQL03\" | Export-sqmDatabaseDocumentation -ContinueOnError"
    ]
  },
  {
    "Name": "Export-sqmServerConfiguration",
    "Synopsis": "Exports all SQL Server configuration settings to a JSON snapshot file.",
    "Params": [
      "SqlInstance",
      "SqlCredential",
      "OutputPath",
      "Label",
      "IncludeDatabases",
      "EnableException"
    ],
    "Examples": [
      "# Create a snapshot before making configuration changes\n$snap = Export-sqmServerConfiguration -SqlInstance \"SQL01\" -Label \"before MaxMemory change\"\nWrite-Host \"Snapshot saved to: $($snap.SnapshotPath)\"",
      "# Export with custom output path\nExport-sqmServerConfiguration -SqlInstance \"SQL01\" `\n  -OutputPath \"C:\\Backups\\SQLSnapshots\" `\n  -Label \"production-baseline\"",
      "# Full export including databases\nExport-sqmServerConfiguration -SqlInstance \"SQL01\" `\n  -IncludeDatabases `\n  -Label \"complete-inventory\""
    ]
  },
  {
    "Name": "Find-sqmDatabaseObject",
    "Synopsis": "Searches all (or selected) databases on an instance for an object name.",
    "Params": [
      "ObjectName",
      "SqlInstance",
      "SqlCredential",
      "Database",
      "IncludeSystem",
      "SearchDefinition",
      "EnableException"
    ],
    "Examples": [
      "Find-sqmDatabaseObject -SqlInstance \"SQL01\" -ObjectName \"sp_GetOrders\"",
      "Find-sqmDatabaseObject -SqlInstance \"SQL01\" -ObjectName \"*log*\" -ObjectType \"TABLE\",\"VIEW\" -Database \"Sales*\""
    ]
  },
  {
    "Name": "Get-sqmADAccountStatus",
    "Synopsis": "Checks the status of an Active Directory user account.",
    "Params": [
      "DomainController"
    ],
    "Examples": [
      "Get-sqmADAccountStatus -SamAccountName 'jdoe'",
      "'jdoe','jsmith' | Get-sqmADAccountStatus",
      "Get-sqmADAccountStatus -SamAccountName 'jdoe' -DomainController 'DC01'"
    ]
  },
  {
    "Name": "Get-sqmADGroupMembers",
    "Synopsis": "Lists all members of an Active Directory group.",
    "Params": [
      "Domain",
      "OutputPath"
    ],
    "Examples": [
      "Get-sqmADGroupMembers -GroupName \"DL_SQL_Admins\"",
      "Get-sqmADGroupMembers -GroupName \"Administrators\" -Domain \"FITS\""
    ]
  },
  {
    "Name": "Get-sqmAgentJobHistory",
    "Synopsis": "Displays the execution history of SQL Agent jobs.",
    "Params": [
      "SqlInstance",
      "SqlCredential",
      "JobName",
      "Status",
      "Since",
      "LastX",
      "OutputPath",
      "EnableException"
    ],
    "Examples": [
      "Get-sqmAgentJobHistory",
      "Get-sqmAgentJobHistory -JobName '*Backup*' -Status Failure -Since (Get-Date).AddDays(-1)"
    ]
  },
  {
    "Name": "Get-sqmAlwaysOnHealthReport",
    "Synopsis": "Creates a detailed health report for all Always On availability groups on an instance.",
    "Params": [
      "SqlCredential",
      "MaxRedoQueueMB",
      "MaxSendQueueMB",
      "OutputPath",
      "ContinueOnError",
      "EnableException",
      "NoOpen"
    ],
    "Examples": [
      "Get-sqmAgHealthReport",
      "Get-sqmAgHealthReport -SqlInstance \"SQL01\" -MaxRedoQueueMB 200 -OutputPath \"D:\\Reports\""
    ]
  },
  {
    "Name": "Get-sqmAutoGrowthReport",
    "Synopsis": "Creates an AutoGrowth configuration report for all database files on a SQL Server instance.",
    "Params": [
      "SqlInstance",
      "SqlCredential",
      "IncludeSystem",
      "Detailed",
      "EnableException"
    ],
    "Examples": [
      "Get-sqmAutoGrowthReport -SqlInstance \"SQL01\"",
      "Get-sqmAutoGrowthReport -SqlInstance \"SQL01\" -Detailed -IncludeSystem"
    ]
  },
  {
    "Name": "Get-sqmBlockingReport",
    "Synopsis": "Retrieves current blocking chains on a SQL Server instance.",
    "Params": [
      "SqlInstance",
      "SqlCredential",
      "MinWaitSeconds",
      "OutputPath",
      "EnableException",
      "NoOpen"
    ],
    "Examples": [
      "Get-sqmBlockingReport",
      "Get-sqmBlockingReport -SqlInstance \"SQL01\" -MinWaitSeconds 30",
      "# Check whether blocking is currently occurring\r\n    if ((Get-sqmBlockingReport -SqlInstance \"SQL01\").HasBlocking) { Write-Warning \"Blocking detected!\" }",
      "# Regular snapshot via Agent job\r\n    Get-sqmBlockingReport -SqlInstance \"SQL01\" -OutputPath \"$env:ProgramData\\sqmSQLTool\\Logs\\Blocking\""
    ]
  },
  {
    "Name": "Get-sqmCertificateReport",
    "Synopsis": "Creates a comprehensive report on SQL Server certificates and their expiration dates.",
    "Params": [
      "SqlCredential",
      "WarningThresholdDays",
      "CriticalThresholdDays",
      "IncludeUserDatabases",
      "OutputPath",
      "ContinueOnError",
      "EnableException"
    ],
    "Examples": [
      "Get-sqmCertificateReport",
      "Get-sqmCertificateReport -SqlInstance \"SQL01\",\"SQL02\" -WarningThresholdDays 180",
      "# Show only expiring certificates\r\n    Get-sqmCertificateReport -SqlInstance \"SQL01\" |\r\n        Select-Object -ExpandProperty Certificates |\r\n        Where-Object { $_.ExpiryStatus -ne 'OK' } |\r\n        Select-Object SqlInstance, DatabaseName, CertificateName, ExpiryDate, DaysRemaining, ExpiryStatus, Purpose",
      "# Pipeline across multiple instances\r\n    'SQL01','SQL02','SQL03' | Get-sqmCertificateReport -OutputPath \"D:\\Reports\\Certs\""
    ]
  },
  {
    "Name": "Get-sqmClusterInfo",
    "Synopsis": "Retrieves information about a Windows Failover Cluster: cluster name, nodes and roles including IP addresses.",
    "Params": [
      "ClusterName",
      "IncludeCoreGroup",
      "NoAutoInstall",
      "EnableException"
    ],
    "Examples": [
      "$info = Get-sqmClusterInfo -ClusterName \"MYCLUSTER\"\r\n    if (-not $info.Success) { Write-Error $info.ErrorMessage; return }\r\n    $info.ClusterName\r\n    $info.Nodes | Format-Table\r\n    $info.Roles | Where-Object OwnerNode -eq \"Node1\" | Select Name, IPAddresses",
      "Get-sqmClusterInfo -IncludeCoreGroup\r\n\r\n    Queries the local cluster and returns all roles including the core group."
    ]
  },
  {
    "Name": "Get-sqmConfig",
    "Synopsis": "Returns the current module configuration.",
    "Params": [
      "Key"
    ],
    "Examples": [
      "Get-sqmConfig",
      "Get-sqmConfig -Key 'OutputPath'"
    ]
  },
  {
    "Name": "Get-sqmConnectionStats",
    "Synopsis": "Analyzes active SQL Server connections and connection statistics.",
    "Params": [
      "SqlInstance",
      "SqlCredential",
      "GroupBy",
      "TopN",
      "IncludeSystemConnections",
      "OutputPath",
      "EnableException"
    ],
    "Examples": [
      "Get-sqmConnectionStats -SqlInstance \"SQL01\"",
      "Get-sqmConnectionStats -SqlInstance \"SQL01\" -GroupBy Login -TopN 10",
      "Get-sqmConnectionStats -SqlInstance \"SQL01\" -GroupBy Database -IncludeSystemConnections"
    ]
  },
  {
    "Name": "Get-sqmDatabaseHealth",
    "Synopsis": "Aggregated health report for all databases on an instance.",
    "Params": [
      "SqlCredential",
      "MaxCheckDbAgeDays",
      "MaxVlfCount",
      "HistoryDays",
      "IncludeSystemDatabases",
      "OutputPath",
      "ContinueOnError",
      "EnableException",
      "NoOpen"
    ],
    "Examples": [
      "Get-sqmDatabaseHealth",
      "Get-sqmDatabaseHealth -SqlInstance \"SQL01\" -IncludeSystemDatabases -OutputPath \"D:\\Reports\""
    ]
  },
  {
    "Name": "Get-sqmDeadlockReport",
    "Synopsis": "Reads and analyzes deadlock events from the System Health Extended Event session.",
    "Params": [
      "SqlInstance",
      "SqlCredential",
      "StartTime",
      "EndTime",
      "MaxDeadlocks",
      "OutputPath",
      "EnableException"
    ],
    "Examples": [
      "Get-sqmDeadlockReport",
      "Get-sqmDeadlockReport -SqlInstance \"SQL01\" -StartTime (Get-Date).AddDays(-7)",

  },
  {
    "Name": "Get-sqmDiskBlockSize",

    "Params": [
      "SqlInstance",
      "ComputerName",
      "RecommendedBlockSize",
      "EnableException"
    ],
    "Examples": [
      "# Einzelne Laufwerke pruefen\n    Get-sqmDiskBlockSize -Drive 'F', 'G', 'H'",
      "# Automatisch alle SQL-Laufwerke der Instanz ermitteln und pruefen\n    Get-sqmDiskBlockSize -SqlInstance \"SQL01\"",
      "# Pipeline\n    'F','G' | Get-sqmDiskBlockSize",

      "OutputPath",
      "ContinueOnError",
      "EnableException",

  },
  {
    "Name": "Get-sqmIndexFragmentation",

        function renderFunctions(toRender) {
            const container = document.getElementById('functions-container');
            container.innerHTML = '';

            toRender.forEach(func => {
                const card = document.createElement('div');
                card.className = 'psdb-st-card';
                card.id = 'func-' + func.Name.toLowerCase().replace(/[^a-z0-9-]/g, '');

                let paramsHtml = '';
                if (func.Params && func.Params.length > 0) {
                    paramsHtml = '<div class="psdb-st-section-title">Parameters</div><ul class="psdb-st-params">';
                    func.Params.forEach(p => {
                        paramsHtml += '<li class="psdb-st-param">' + escapeHtml(p) + '</li>';
                    });
                    paramsHtml += '</ul>';
                }

                let examplesHtml = '';
                if (func.Examples && func.Examples.length > 0) {
                    examplesHtml = '<div class="psdb-st-section-title">Examples</div><div class="psdb-st-examples">';
                    func.Examples.forEach(ex => {
                        examplesHtml += '<div class="psdb-st-example">' + escapeHtml(ex) + '</div>';
                    });
                    examplesHtml += '</div>';
                }

                card.innerHTML = 
                    <div class="psdb-st-card-title">\</div>
                    <div class="psdb-st-card-synopsis">\</div>
                    \
                    \
                ;

                container.appendChild(card);
            });
        }

        function filterFunctions() {
            const query = document.getElementById('search').value.toLowerCase();
            const filtered = functions.filter(f =>
                f.Name.toLowerCase().includes(query) ||
                (f.Synopsis && f.Synopsis.toLowerCase().includes(query))
            );

            document.querySelectorAll('.psdb-st-card').forEach(card => {
                if (filtered.find(f => 'func-' + f.Name.toLowerCase().replace(/[^a-z0-9-]/g, '') === card.id)) {
                    card.classList.remove('hidden');
                } else {
                    card.classList.add('hidden');
                }
            });

            updateSidebar(filtered);
        }

        function updateSidebar(toShow) {
            const list = document.getElementById('function-list');
            list.innerHTML = '';
            toShow.forEach(func => {
                const item = document.createElement('li');
                item.className = 'psdb-st-sidebar-item';
                const link = document.createElement('a');
                link.className = 'psdb-st-sidebar-link';
                link.href = '#func-' + func.Name.toLowerCase().replace(/[^a-z0-9-]/g, '');
                link.textContent = func.Name;
                item.appendChild(link);
                list.appendChild(item);
            });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Initialize
        renderFunctions(functions);
        updateSidebar(functions);

        document.getElementById('search').addEventListener('input', filterFunctions);
    </script>
