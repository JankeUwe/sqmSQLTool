# =============================================================================
# sqmSQLTool - Publish to GitHub Release (unsigned, for PSGallery consumption)
# =============================================================================
#
# Laeuft bei: Push eines Release-Tags (v*.*.*)
#
# Was passiert:
#   1. Modul-Dateien als ZIP verpacken
#   2. ZIP als GitHub Release Asset hochladen
#   3. Release-Notes aus CHANGELOG.md einfuegen
#
# Nach dieser Aktion:
#   - ZIP ist unter https://github.com/JankeUwe/sqmSQLTool/releases/tag/vX.Y.Z downloadbar
#   - ZIP kann manuell auf PowerShell Gallery hochgeladen werden
#   - (Spaeter: SignPath-Integration fuer Code Signing)
#
# =============================================================================

name: Publish Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  publish:
    runs-on: windows-latest
    name: Package & Release

    steps:
      # ------------------------------------------------------------------
      # 1. Repository auschecken
      # ------------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # 2. Modul-Version aus PSD1 lesen
      # ------------------------------------------------------------------
      - name: Read module version
        id: version
        shell: pwsh
        run: |
          $psd1 = Import-PowerShellDataFile "sqmSQLTool.psd1"
          $ver  = $psd1.ModuleVersion
          Write-Host "Module version: $ver"
          echo "version=$ver" >> $env:GITHUB_OUTPUT
          echo "artifact_name=sqmSQLTool-v$ver" >> $env:GITHUB_OUTPUT

      # ------------------------------------------------------------------
      # 3. Modul als ZIP verpacken (nur Modul-Dateien, keine Dev-Artefakte)
      # ------------------------------------------------------------------
      - name: Package module
        id: package
        shell: pwsh
        run: |
          $outDir  = "dist"
          $zipName = "sqmSQLTool-v${{ steps.version.outputs.version }}.zip"
          $zipPath = Join-Path $outDir $zipName

          New-Item -ItemType Directory -Path $outDir -Force | Out-Null

          # Dateien sammeln (nur Modul-relevante, keine Dev-Artefakte)
          $exclude = @('.git', 'dist', '.github', 'tests', 'Docs', '*.log', '*.jpa', '.psproj*')
          $files   = Get-ChildItem -Recurse -File | Where-Object {
            $rel = $_.FullName.Replace("$pwd\", '')
            $isExcluded = $false
            foreach ($ex in $exclude) {
              if ($rel -like "$ex*" -or $rel -like "*\$ex*") {
                $isExcluded = $true
                break
              }
            }
            -not $isExcluded
          }

          Write-Host "Files to package: $($files.Count)"

          # Dateien in ein Staging-Verzeichnis kopieren und dabei die relativen
          # Pfade erhalten. Compress-Archive plattet eine uebergebene DATEI-Liste
          # ein: Public\Foo.ps1 landet als Foo.ps1 im Archiv-Root. sqmSQLTool.psm1
          # laedt seine Funktionen aber per Get-ChildItem aus Public\ und Private\
          # (mit -ErrorAction SilentlyContinue) - fehlen die Ordner, exportiert das
          # Modul kommentarlos NULL Funktionen. Ein Verzeichnis-Glob erhaelt die
          # Struktur.
          $staging = "staging"
          Remove-Item $staging -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path $staging -Force | Out-Null

          foreach ($f in $files) {
            $rel  = $f.FullName.Substring("$pwd\".Length)
            $dest = Join-Path $staging $rel
            $destDir = Split-Path $dest -Parent
            if (-not (Test-Path $destDir)) {
              New-Item -ItemType Directory -Path $destDir -Force | Out-Null
            }
            Copy-Item -LiteralPath $f.FullName -Destination $dest
          }

          Compress-Archive -Path "$staging\*" -DestinationPath $zipPath -Force
          Write-Host "Created: $zipPath ($([math]::Round((Get-Item $zipPath).Length / 1KB)) KB)"
          echo "zip_path=$zipPath"  >> $env:GITHUB_OUTPUT
          echo "zip_name=$zipName"  >> $env:GITHUB_OUTPUT

      # ------------------------------------------------------------------
      # 3b. ZIP-Struktur verifizieren
      #     Das Archiv war ueber alle bisherigen Releases hinweg flach und damit
      #     als Modul unbrauchbar, ohne dass es jemand gemerkt hat. Der Schritt
      #     bricht den Release ab, statt das nochmal still passieren zu lassen.
      # ------------------------------------------------------------------
      - name: Verify ZIP layout
        shell: pwsh
        run: |
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $zip = [System.IO.Compression.ZipFile]::OpenRead((Resolve-Path "${{ steps.package.outputs.zip_path }}"))
          try {
            $entries = $zip.Entries.FullName
          } finally {
            $zip.Dispose()
          }

          $srcPublic = (Get-ChildItem "Public" -Filter *.ps1 -Recurse -File).Count
          $zipPublic = ($entries | Where-Object { $_ -like 'Public/*.ps1' }).Count
          $zipPrivate = ($entries | Where-Object { $_ -like 'Private/*.ps1' }).Count
          $hasManifest = $entries -contains 'sqmSQLTool.psd1'
          $hasRootModule = $entries -contains 'sqmSQLTool.psm1'

          Write-Host "Public/*.ps1  im Archiv: $zipPublic (Quelle: $srcPublic)"
          Write-Host "Private/*.ps1 im Archiv: $zipPrivate"
          Write-Host "sqmSQLTool.psd1 im Root: $hasManifest"
          Write-Host "sqmSQLTool.psm1 im Root: $hasRootModule"

          $errors = @()
          if (-not $hasManifest)          { $errors += "sqmSQLTool.psd1 fehlt im Archiv-Root" }
          if (-not $hasRootModule)        { $errors += "sqmSQLTool.psm1 fehlt im Archiv-Root" }
          if ($zipPrivate -lt 1)          { $errors += "Private/ ist leer oder eingeplattet" }
          if ($zipPublic -ne $srcPublic)  { $errors += "Public/ hat $zipPublic statt $srcPublic .ps1 - Struktur kaputt" }

          if ($errors) {
            Write-Host ""
            Write-Host "❌ ZIP-Layout ungueltig:"
            $errors | ForEach-Object { Write-Host "   - $_" }
            exit 1
          }
          Write-Host "✅ ZIP-Layout ok"

      # ------------------------------------------------------------------
      # 4. Release mit ZIP Asset erstellen
      # ------------------------------------------------------------------
      - name: Create Release with ZIP asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          tag_name: ${{ github.ref_name }}
          fail_on_unmatched_files: false
          body: |
            ## sqmSQLTool ${{ steps.version.outputs.version }}

            See [CHANGELOG.md](https://github.com/JankeUwe/sqmSQLTool/blob/main/CHANGELOG.md) for details.

            ### Download & Install

            **PowerShell 5.1+:**
            ```powershell
            # From GitHub Release ZIP (manual)
            # 1. Download sqmSQLTool-v${{ steps.version.outputs.version }}.zip
            # 2. Extract to C:\Program Files\PowerShell\Modules\sqmSQLTool
            # 3. Import-Module sqmSQLTool

            # Or via PowerShell Gallery (coming soon)
            Install-Module sqmSQLTool -Repository PSGallery
            ```

            ### Note
            Code signing (Authenticode) will be added in the next release phase.
